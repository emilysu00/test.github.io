<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KEELUNG</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/pre-popup.css" />
  </head>

  <body class="" data-pre-popup-root>
    <div class="stage keelung show-grid">
      <div class="grid-overlay"></div>
      <header class="t-header">
        <div class="grid-container">
          <button
            class="pre-popup-trigger font-en col-1 left"
            type="button"
            data-popup-target="map"
            aria-expanded="false"
            aria-controls="pre-popup-map"
          >
            MAP
          </button>

          <div class="col-2-4 center">
            <img src="img/logo.svg" alt="TAMSUI Logo" class="t-header__logo" />
          </div>

          <button
            class="pre-popup-trigger font-en col-4 right"
            type="button"
            data-popup-target="ins"
            aria-expanded="false"
            aria-controls="pre-popup-ins"
          >
            INS
          </button>
        </div>
      </header>

      <div class="pre-popup-layer" aria-live="polite">
        <div
          class="pre-popup pre-popup--map"
          id="pre-popup-map"
          data-popup="map"
          aria-hidden="true"
        >
          <div class="pre-popup__panel pre-popup__panel--map">
            <img
              class="pre-popup__image"
              src="img/taiwan/01.svg"
              alt="Taiwan map"
            />
          </div>
        </div>

        <div
          class="pre-popup pre-popup--ins"
          id="pre-popup-ins"
          data-popup="ins"
          data-ig-url="https://www.instagram.com/flowtea.drink?igsh=aXRjenQ2N203dGxy&utm_source=qr"
          aria-hidden="true"
        >
          <div class="pre-popup__panel pre-popup__panel--ins">
            <p class="pre-popup__label">INSTAGRAM</p>
            <a
              class="pre-popup__link"
              data-ig-link
              href="https://www.instagram.com/flowtea.drink?igsh=aXRjenQ2N203dGxy&utm_source=qr"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Open Instagram profile"
            >
              <img
                class="pre-popup__qr"
                data-ig-qr
                src=""
                alt="Instagram QR code"
              />
            </a>
          </div>
        </div>
      </div>

      <main class="t-content">
        <section class="t-fullbleed">
          <video
            class="t-banner"
            src="img/banner/基隆河_weoine.mp4"
            alt=""
            autoplay
            muted
            loop
            playsinline
          ></video>
        </section>

        <section class="t-section t-titleRow">
          <div class="grid-container">
            <div class="t-titleRow__left col-1-3">
              <img
                class="t-titleRow__logo"
                src="./img/logotype/KEELUNG.svg"
                alt="KEELUNG"
              />
            </div>

            <div class="t-titleRow__right col-3-5">
              <p class="t-titleRow__en">KEELUNG RIVER</p>
            </div>
          </div>
        </section>

        <section class="t-section t-itemHeader">
          <div class="grid-container">
            <div class="t-itemHeader__left col-1-3">
              <p class="t-itemHeader__label">( I T E M )</p>
              <p class="t-itemHeader__label">DESCRIPTION</p>
            </div>

            <div class="t-itemHeader__right col-3-5">
              <p class="t-itemHeader__label">Customization</p>
              <p class="t-itemHeader__sub">三分糖 / 少冰</p>
            </div>
          </div>
        </section>

        <section class="t-section t-drinkScrollSection">
          <div class="grid-container">
            <div class="col-1-5">
              <div class="t-drinkUI" data-variant="750">
                <!-- LEFT -->
                <div
                  class="t-drinkUI__left js-drink-control"
                  data-variant="750"
                  data-max="750"
                  data-value="375"
                  data-unit="ml"
                >
                  <div class="t-sliderBlock">
                    <input
                      class="t-verticalRange js-drink-range"
                      type="range"
                      min="0"
                      step="1"
                      aria-label="Drink amount"
                    />

                    <div class="t-sliderScale">
                      <div
                        class="t-scaleLabel t-scaleLabel--top js-scale-top"
                      ></div>
                      <div
                        class="t-scaleLabel t-scaleLabel--mid js-scale-mid"
                      ></div>
                      <div class="t-scaleLabel t-scaleLabel--bot">
                        <span class="js-scale-bottom"></span><br /><span
                          class="js-scale-unit"
                        ></span>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- MIDDLE -->
                <div class="t-drinkUI__middle" aria-hidden="true">
                  <div class="t-cupStage750">
                    <!-- cup -->
                    <img class="t-cupSvg" src="img/cup750.svg" alt="" />
                    <!-- liquid reveal mask -->
                    <div class="t-liquidMask js-liquid-mask">
                      <!-- 底層：模糊 -->
                      <img
                        class="t-liquidSvg t-liquidSvg--blur"
                        src="img/drinks/keelung.svg"
                        alt=""
                      />

                      <!-- 上層：清晰 -->
                      <img
                        class="t-liquidSvg t-liquidSvg--sharp js-liquid-svg"
                        src="img/drinks/keelung.svg"
                        alt=""
                      />
                    </div>
                  </div>

                  <div class="t-mlReadout">
                    <span class="js-ml-value">375</span
                    ><span class="t-mlUnit js-ml-unit"> ml</span>
                  </div>
                </div>

                <!-- RIGHT -->
                <div class="t-drinkUI__right">
                  <div class="t-meta">
                    <div
                      class="t-metaArrow js-meta-arrow"
                      aria-hidden="true"
                    ></div>

                    <div class="t-row" data-row="top">
                      <div class="t-rowMain">
                        <span class="t-bracket">文山包種茶：茶區支流</span>
                      </div>
                      <div class="t-rowDesc">
                        基隆河支流流經包種茶產區，茶香隨山水匯入主流。
                      </div>
                    </div>

                    <div class="t-row" data-row="bottom">
                      <div class="t-rowMain">
                        <span class="t-bracket">柚子醬：雨後橙黃河色</span>
                      </div>
                      <div class="t-rowDesc">
                        河水因雨後泥沙與鐵質泛澄，色澤如同中游文旦柚的果皮。
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <!-- Dot Section -->
        <section class="t-section t-riverDots">
          <div class="grid-container t-riverDots__inner">
            <img class="t-riverDot" src="img/stones/W.svg" alt="" />
            <img class="t-riverDot" src="img/stones/W.svg" alt="" />
          </div>
        </section>

        <!-- Text Section -->
        <section class="t-section t-riverNav">
          <div class="grid-container t-riverNav__grid">
            <div class="t-riverNav__left">
              <p class="t-riverNav__text">RIVER INFORMATION<br />DETAIL</p>
            </div>

            <div class="t-riverNav__center">
              <p class="t-riverNav__text">(N1)</p>
            </div>

            <div class="t-riverNav__right">
              <p class="t-riverNav__text">NORTH RIVER’S<br />DETAIL</p>
            </div>
          </div>
        </section>

        <section class="t-section">
          <div class="grid-container">
            <div class="col-1-5">
              <img class="t-img" src="img/map/01.png" alt="" />
            </div>
          </div>
        </section>
      </main>

      <footer class="t-cta">
        <a href="./motion/01.html" class="t-cta__link">
          <div class="glow">
            <span class="t-cta__glow" id="keelung" aria-hidden="true"></span>
          </div>

          <div class="t-cta__card">
            <div class="t-cta__dots" aria-hidden="true">
              <img class="t-cta__dot" src="img/stones/W.svg" alt="" />
              <img class="t-cta__dot" src="img/stones/W.svg" alt="" />
            </div>

            <div class="t-cta__titleWrap">
              <div class="t-cta__titleEn">MAKE DRINK</div>
              <button class="t-cta__titleZh" type="button">
                <img src="img/start-ch.svg" alt="" />
              </button>
            </div>
          </div>
        </a>
      </footer>
    </div>
    <script src="js/debug.js"></script>
    <script src="js/drink-config.js"></script>
    <script src="js/interaction.js"></script>
    <script src="js/pre-popup.js"></script>
  </body>
</html>
