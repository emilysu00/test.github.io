
<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Drink Items</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/pre-popup.css" />
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body class="index-body" data-pre-popup-root>
    <header class="t-header">
        <div class="grid-container">
          <button
            class="pre-popup-trigger font-en col-1 left"
            type="button"
            data-popup-target="map"
            aria-expanded="false"
            aria-controls="pre-popup-map"
          >
            MAP
          </button>

          <div class="col-2-4 center">
            <img src="img/logo.svg" alt="TAMSUI Logo" class="t-header__logo" />
          </div>

          <button
            class="pre-popup-trigger font-en col-4 right"
            type="button"
            data-popup-target="ins"
            aria-expanded="false"
            aria-controls="pre-popup-ins"
          >
            INS
          </button>
        </div>
      </header>

      <div class="pre-popup-layer" aria-live="polite">
        <div
          class="pre-popup pre-popup--map"
          id="pre-popup-map"
          data-popup="map"
          aria-hidden="true"
        >
          <div class="pre-popup__panel pre-popup__panel--map">
            <img
              class="pre-popup__image"
              src="img/taiwan/empty.svg"
              alt="Taiwan map"
            />
          </div>
        </div>

        <div
          class="pre-popup pre-popup--ins"
          id="pre-popup-ins"
          data-popup="ins"
          data-ig-url="https://www.instagram.com/flowtea.drink?igsh=aXRjenQ2N203dGxy&utm_source=qr"
          aria-hidden="true"
        >
          <div class="pre-popup__panel pre-popup__panel--ins">
            <p class="pre-popup__label">INSTAGRAM</p>
            <a
              class="pre-popup__link"
              data-ig-link
              href="https://www.instagram.com/flowtea.drink?igsh=aXRjenQ2N203dGxy&utm_source=qr"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Open Instagram profile"
            >
              <img
                class="pre-popup__qr"
                data-ig-qr
                src=""
                alt="Instagram QR code"
              />
            </a>
          </div>
        </div>
      </div>

    <div class="index-stage">

        <section class="index-hero" aria-label="Drink items hero">

                src="img/index/banner.jpg"
                alt="Drink items preview"
              ></img>
            </div>
          </div>
        </section>

        <section class="title-row">
          <div class="grid-container-m">

              <p class="index-hero__title st1">DRINK ITEMS</p>
            </div>
          </div>
        </section>

        <section class="index-region" aria-labelledby="region-north">
          <div class="grid-container-m">
            <div class="index-region__head">
              <h2 class="index-region__name st3" id="region-north">NORTH</h2>
              <img
                class="index-region__dot"
                src="img/stones/N.svg"
              ></img>
            </div>
            <div class="index-region__grid">
              <article class="drink-card">
                <a class="drink-card__link" href="./KEELUNG.html">
                  <div class="drink-card__media">
                    <img
                      class="drink-card__img"
                      src="img/index/01.jpg"
                      alt="基隆河 / KEELUNG RIVER"
                    />
                  </div>
                  <div class="drink-card__meta">
                    <img class="drink-card__titleZh" src="img/logotype/KEELUNG.svg" alt="基隆河" />
                    <p class="drink-card__titleEn body1-pre">KEELUNG RIVER</p>
                  </div>
                </a>

<img class="drink-card__titleZh" src="img/logotype/DAHAN.svg" alt="大漢溪" />                    <p class="drink-card__titleEn body1-pre">DAHAN RIVER</p>

              <article class="drink-card">

<img class="drink-card__titleZh" src="img/logotype/BAIBAO.svg" alt="基隆河" />                    <p class="drink-card__titleEn body1-pre">BAIBAO RIVER</p>

      </main>
